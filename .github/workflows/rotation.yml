name: ETF Rotation

on:
  schedule:
    - cron: '0 9 * * 5'

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Packages
      run: |
        pip install -r requirements.txt

    - name: Run Strategy
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: |
        python main.py
